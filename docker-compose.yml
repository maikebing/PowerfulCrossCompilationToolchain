x-build-job: &build-job
  init: true
  restart: "no"
  working_dir: /LaneApp
  volumes:
    - type: bind
      source: ${BUILD_DIR:?Please set BUILD_DIR to the host source directory}
      target: /LaneApp
  environment:
    BUILD_COMMAND: ${BUILD_COMMAND:-make}
  pull_policy: always
  entrypoint:
    - /bin/bash
    - -lc
  command:
    - |-
      set -euo pipefail
      if [ ! -d /LaneApp ]; then
        echo "Missing mounted build directory: /LaneApp" >&2
        exit 2
      fi
      echo "Starting build in /LaneApp"
      echo "Command: $$BUILD_COMMAND"
      exec bash -lc "$$BUILD_COMMAND"

services:
  x86legacy:
    <<: *build-job
    image: ${PCCT_IMAGE_PREFIX:-ghcr.io/maikebing}/pcct-build-x86-legacy:${PCCT_IMAGE_TAG:-latest}
    platform: linux/386

  x86:
    <<: *build-job
    image: ${PCCT_IMAGE_PREFIX:-ghcr.io/maikebing}/pcct-build-x86:${PCCT_IMAGE_TAG:-latest}
    platform: linux/386

  arm:
    <<: *build-job
    image: ${PCCT_IMAGE_PREFIX:-ghcr.io/maikebing}/pcct-build-arm:${PCCT_IMAGE_TAG:-latest}
    platform: linux/386

  x64:
    <<: *build-job
    image: ${PCCT_IMAGE_PREFIX:-ghcr.io/maikebing}/pcct-build-x64:${PCCT_IMAGE_TAG:-latest}
    platform: linux/amd64

  arm64:
    <<: *build-job
    image: ${PCCT_IMAGE_PREFIX:-ghcr.io/maikebing}/pcct-build-arm64:${PCCT_IMAGE_TAG:-latest}
    platform: linux/amd64

  loongson:
    <<: *build-job
    image: ${PCCT_IMAGE_PREFIX:-ghcr.io/maikebing}/pcct-build-loongson:${PCCT_IMAGE_TAG:-latest}
    platform: linux/amd64
