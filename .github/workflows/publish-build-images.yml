name: Publish Build Images

on:
  push:
    paths:
      - ".github/workflows/publish-build-images.yml"
      - "arm/**"
      - "arm64/**"
      - "loongson/**"
      - "sources/**"
      - "x64/**"
      - "x86/**"
      - "x86Legacy/**"
      - "rebuildcurl.sh"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86Legacy
            file: x86Legacy/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/pcct-build-x86-legacy
            cache_scope: pcct-build-x86-legacy
            container_platform: linux/386
          - name: x86
            file: x86/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/pcct-build-x86
            cache_scope: pcct-build-x86
            container_platform: linux/386
          - name: arm
            file: arm/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/pcct-build-arm
            cache_scope: pcct-build-arm
            container_platform: linux/386
          - name: x64
            file: x64/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/pcct-build-x64
            cache_scope: pcct-build-x64
            container_platform: linux/amd64
          - name: arm64
            file: arm64/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/pcct-build-arm64
            cache_scope: pcct-build-arm64
            container_platform: linux/amd64
          - name: loongson
            file: loongson/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/pcct-build-loongson
            cache_scope: pcct-build-loongson
            container_platform: linux/amd64
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_TAG="${{ matrix.image }}:sha-${GITHUB_SHA::7}"
          {
            echo 'tags<<EOF'
            echo "$SHA_TAG"
            if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
              echo "${{ matrix.image }}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.file }}
          platforms: ${{ matrix.container_platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
